services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulse-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/pulse.db
      - MOYSKLAD_TOKEN=${MOYSKLAD_TOKEN}
      - MOYSKLAD_WEBHOOK_SECRET=${MOYSKLAD_WEBHOOK_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=false
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
    volumes:
      - pulse_data:/app/data
    expose:
      - "8000"
    networks:
      - pulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Frontend (React / static) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulse-frontend
    restart: unless-stopped
    networks:
      - pulse-net
    depends_on:
      - backend

  # ─── Nginx (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - pulse_frontend_dist:/usr/share/nginx/html:ro
    networks:
      - pulse-net
    depends_on:
      - backend
      - frontend

volumes:
  pulse_data:
    driver: local
  pulse_frontend_dist:
    driver: local

networks:
  pulse-net:
    driver: bridge
